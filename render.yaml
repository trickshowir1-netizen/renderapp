services:
  - type: web
    name: rvg-gateway
    runtime: image
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    plan: free
    dockerCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && python main.py
    envVars:
      - key: RENDER_PUBLIC_DOMAIN
        value: rvg-gateway.onrender.com
      - key: SECRET_KEY
        generateValue: true
